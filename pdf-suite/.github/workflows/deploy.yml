name: Deploy to AWS

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:latest
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:latest

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
            init-letsencrypt.sh

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/home/ubuntu/pdf-suite' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${EC2_USER}@${EC2_HOST}"
          SCP_CMD="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Ensure Docker is installed on the server
          ${SSH_CMD} << 'SETUP_EOF'
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              sudo apt-get update
              sudo apt-get install -y ca-certificates curl gnupg
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker $USER
              echo "Docker installed successfully."
            fi
            echo "Docker version: $(docker --version)"
            echo "Docker Compose version: $(docker compose version)"
          SETUP_EOF

          # Create deployment directory and copy compose file + init script
          ${SSH_CMD} "mkdir -p ${DEPLOY_DIR}"
          ${SCP_CMD} docker-compose.prod.yml ${EC2_USER}@${EC2_HOST}:${DEPLOY_DIR}/docker-compose.yml
          ${SCP_CMD} init-letsencrypt.sh ${EC2_USER}@${EC2_HOST}:${DEPLOY_DIR}/init-letsencrypt.sh
          ${SSH_CMD} "chmod +x ${DEPLOY_DIR}/init-letsencrypt.sh"

          # Pull images and deploy
          ${SSH_CMD} << EOF
            cd ${DEPLOY_DIR}

            echo "=== Logging in to GitHub Container Registry ==="
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u ${GHCR_USER} --password-stdin

            echo "=== Pulling latest images ==="
            BACKEND_IMAGE=${BACKEND_IMAGE} FRONTEND_IMAGE=${FRONTEND_IMAGE} docker compose pull

            echo "=== Stopping existing containers ==="
            BACKEND_IMAGE=${BACKEND_IMAGE} FRONTEND_IMAGE=${FRONTEND_IMAGE} docker compose down --remove-orphans || true

            echo "=== Initializing SSL certificates (skips if already present) ==="
            BACKEND_IMAGE=${BACKEND_IMAGE} FRONTEND_IMAGE=${FRONTEND_IMAGE} ./init-letsencrypt.sh

            echo "=== Starting all containers ==="
            BACKEND_IMAGE=${BACKEND_IMAGE} FRONTEND_IMAGE=${FRONTEND_IMAGE} docker compose up -d

            echo "=== Waiting for services to be healthy ==="
            sleep 10

            echo "=== Checking service status ==="
            BACKEND_IMAGE=${BACKEND_IMAGE} FRONTEND_IMAGE=${FRONTEND_IMAGE} docker compose ps

            echo "=== Cleaning up old Docker images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
          EOF

      - name: Health check
        run: |
          echo "Waiting for application to be ready..."
          sleep 15
          for i in {1..5}; do
            HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://smartpdfsuite.com/api/health || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Application is healthy! (HTTP $HTTP_STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS - Retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
