# Redirect HTTP → HTTPS (non-www)
server {
    listen 80;
    server_name smartpdfsuite.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://smartpdfsuite.com$request_uri;
    }
}

# Redirect HTTP www → HTTPS non-www (direct, single hop)
server {
    listen 80;
    server_name www.smartpdfsuite.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://smartpdfsuite.com$request_uri;
    }
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl;
    http2 on;
    server_name www.smartpdfsuite.com;

    ssl_certificate /etc/letsencrypt/live/smartpdfsuite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartpdfsuite.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_WWW:1m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Tell crawlers not to index this redirect URL
    add_header X-Robots-Tag "noindex" always;

    return 301 https://smartpdfsuite.com$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name smartpdfsuite.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/smartpdfsuite.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartpdfsuite.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Serve pre-compressed .br / .gz files from build ──
    gzip_static on;

    # Max upload size (match your largest expected PDF)
    client_max_body_size 100M;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Higher timeouts for CPU-intensive high-DPI image conversion (300/600 DPI
    # on large PDFs can take many minutes; default 300 s would cause a 502).
    location /api/convert/images {
        proxy_pass http://backend:8000/api/convert/images;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;

        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for large file uploads/processing
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Buffering settings for large file responses
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
