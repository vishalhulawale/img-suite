server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API proxy
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large file uploads
        client_max_body_size 50M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Expose custom headers from backend
        proxy_hide_header X-Original-Size;
        proxy_hide_header X-Compressed-Size;
        proxy_hide_header X-Compression-Ratio;
        proxy_hide_header X-Output-Size;
        proxy_hide_header X-Output-Format;
        proxy_hide_header X-Original-Format;
        proxy_hide_header X-Transparency-Warning;
        proxy_hide_header X-Original-Width;
        proxy_hide_header X-Original-Height;
        proxy_hide_header X-Output-Width;
        proxy_hide_header X-Output-Height;
        proxy_hide_header X-Scale-Factor;
        proxy_hide_header X-Enhancement-Intensity;
        proxy_hide_header X-Platform;
        add_header Access-Control-Expose-Headers "X-Original-Size, X-Compressed-Size, X-Compression-Ratio, X-Output-Size, X-Output-Format, X-Original-Format, X-Transparency-Warning, X-Original-Width, X-Original-Height, X-Output-Width, X-Output-Height, X-Scale-Factor, X-Enhancement-Intensity, X-Platform" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
